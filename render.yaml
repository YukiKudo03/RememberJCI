  #         name: rememberit-db
  #         property: connectionString
  #     - key: REDIS_URL
  #       fromService:
  #         name: rememberit-redis
  #         type: redis
  #         property: connectionString

# PostgreSQLデータベース
databases:
  - name: rememberit-db
    databaseName: rememberit
    user: rememberit
    plan: starter
    ipAllowList: []  # 全てのIPを許可（Renderサービスからのみアクセス可能）

