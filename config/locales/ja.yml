    index:
      title: "アサインメント一覧"
      no_assignments: "アサインメントがありません"
    new:
      title: "アサインメント新規作成"
    form:
      select_text: "テキストを選択"
      select_user: "ユーザーを選択"
      select_group: "グループを選択"
      set_deadline: "期限を設定"

  # テスト管理
  tests:
    index:
      title: "テスト一覧"
      no_tests: "テストがありません"
    new:
      title: "テスト新規作成"
    edit:
      title: "テスト編集"
    show:
      title: "テスト詳細"
    take:
      title: "テスト受験"
