    statuses:
      active: "有効"
      expired: "期限切れ"
      revoked: "失効済み"
      exhausted: "使い切り"
    notices:
      created: "招待リンクを発行しました"
      revoked: "招待リンクを失効しました"
    errors:
      create_failed: "招待リンクを発行できませんでした。入力内容を確認してください。"

  # 招待受諾ページ (未ログイン/ログイン済み/既加入で分岐)
